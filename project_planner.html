<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクト計画ナビゲーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 印刷時のスタイル定義 */
        @media print {
            @page { 
                size: A4;
                margin: 25mm 20mm !important; 
            }
            html, body { 
                height: auto !important; 
                overflow: visible !important; 
                background-color: white !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
            
            header, aside, .no-print, #loader, #toast-container, #reset-modal { 
                display: none !important; 
            }
            
            #app-container, .flex-1, main, #main-area {
                display: block !important; 
                overflow: visible !important; 
                height: auto !important; 
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
            
            #preview-section { 
                position: static !important; 
                width: 100% !important; 
                max-width: none !important; 
                box-shadow: none !important; 
                border: none !important;
                min-height: auto !important;
                padding: 0 !important; 
                margin: 0 !important;
                box-sizing: border-box;
            }
            .print-break-inside-avoid { break-inside: avoid; }
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .input-transition { transition: all 0.2s ease-in-out; }
        .input-transition:focus { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1), 0 2px 4px -1px rgba(59, 130, 246, 0.06); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
        <p class="text-slate-600 font-medium">システムを準備しています...</p>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" class="hidden" onchange="window.importJson(event)">

    <!-- Main App Container -->
    <div id="app-container" class="hidden flex flex-col h-full">
        
        <!-- Header -->
        <header class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-map text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl text-slate-800">プロジェクト計画ナビゲーター</h1>
                    <p class="text-xs text-slate-500">はじめてのPMでも安心のステップバイステップガイド</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="save-status" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-600 transition-all duration-300 min-w-[120px] justify-center">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                    </span>
                    ローカル動作中
                </div>
                <button onclick="window.showResetModal()" class="text-slate-600 hover:text-red-600 transition-colors text-sm font-medium flex items-center gap-1 border-r pr-4 border-slate-300">
                    <i class="fas fa-rotate-right"></i> リセット
                </button>
                <button onclick="window.triggerImport()" class="text-slate-600 hover:text-blue-600 transition-colors text-sm font-medium flex items-center gap-1">
                    <i class="fas fa-file-import"></i> インポート
                </button>
                <button onclick="window.exportJson()" class="text-slate-600 hover:text-blue-600 transition-colors text-sm font-medium flex items-center gap-1">
                    <i class="fas fa-file-export"></i> JSON保存
                </button>
            </div>
        </header>

        <!-- Body -->
        <div class="flex flex-1 overflow-hidden relative">
            
            <!-- Sidebar / Steps -->
            <aside class="w-64 bg-white border-r flex flex-col overflow-y-auto z-10 shadow-sm shrink-0">
                <div class="p-4 border-b">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">作成ステップ</h2>
                </div>
                <nav class="flex-1 p-4" id="sidebar-nav">
                    <!-- Populated by JS -->
                </nav>
                <div class="p-4 border-t text-xs text-slate-400 text-center bg-slate-50">
                    <i class="fas fa-keyboard mr-1"></i> <kbd class="bg-white px-1.5 py-0.5 rounded border border-slate-200">Ctrl</kbd> + <kbd class="bg-white px-1.5 py-0.5 rounded border border-slate-200">Enter</kbd> で次へ
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 flex flex-col bg-slate-50 overflow-hidden relative">
                <div id="main-area" class="flex-1 overflow-y-auto p-8 pb-32">
                    <!-- Content populated by JS -->
                </div>
                
                <!-- Footer Navigation Controls -->
                <div class="absolute bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] no-print">
                    <button id="btn-prev" onclick="window.prevStep()" class="px-6 py-2.5 border border-slate-300 rounded-xl text-slate-600 font-bold hover:bg-slate-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                        <i class="fas fa-chevron-left mr-2"></i> 前のステップ
                    </button>
                    <div id="step-indicator" class="text-sm font-bold text-slate-400 bg-slate-100 px-4 py-1.5 rounded-full">
                        Step 1 of 7
                    </div>
                    <button id="btn-next" onclick="window.nextStep()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-sm hover:shadow shadow-blue-200 flex items-center">
                        次のステップ <i class="fas fa-chevron-right ml-2"></i>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div id="reset-modal" class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl transform transition-all">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 text-red-600 mb-4 mx-auto">
                <i class="fas fa-triangle-exclamation text-xl"></i>
            </div>
            <h3 class="text-lg font-bold text-center text-slate-800 mb-2">計画をリセットしますか？</h3>
            <p class="text-sm text-slate-600 text-center mb-6">これまで入力した内容はすべて消去されます。この操作は取り消せません。</p>
            <div class="flex gap-3">
                <button onclick="window.closeResetModal()" class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition-colors">キャンセル</button>
                <button onclick="window.executeReset()" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition-colors shadow-sm">リセットする</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // Data Models & State
        // ==========================================
        const STEPS = [
            { id: 'basic', icon: 'fa-info-circle', title: '基本情報' },
            { id: 'tasks', icon: 'fa-list-check', title: 'タスクの洗い出し' },
            { id: 'schedule', icon: 'fa-calendar-alt', title: 'スケジュール計画' },
            { id: 'resources', icon: 'fa-users-gear', title: '資源（リソース）' },
            { id: 'risks', icon: 'fa-triangle-exclamation', title: 'リスク管理' },
            { id: 'communications', icon: 'fa-comments', title: 'コミュニケーション' },
            { id: 'preview', icon: 'fa-file-lines', title: '計画書プレビュー' }
        ];

        const createDefaultData = () => ({
            basic: { name: "", objective: "", background: "" },
            tasks: [], 
            schedule: { start: "", end: "", milestones: [] }, 
            resources: { human: [], material: [], intangible: [] }, 
            risks: [], 
            communications: [] 
        });

        const state = {
            currentStepIndex: 0,
            isCloudMode: false,
            projectData: createDefaultData()
        };

        let db, auth, currentUserId;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project-planner-app';
        let focusAfterRender = null; 

        // ==========================================
        // Helper Functions
        // ==========================================
        const escapeHtml = (unsafe) => {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        // --- Local Storage Functions ---
        const LOCAL_STORAGE_KEY = 'project_planner_local_data';

        function loadFromLocal() {
            try {
                const data = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    state.projectData = { ...createDefaultData(), ...parsed };
                }
            } catch (e) {
                console.error("Local storage read error", e);
            }
        }

        function saveToLocal() {
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(state.projectData));
            } catch (e) {
                console.error("Local storage write error", e);
            }
        }

        window.showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            
            toast.className = `${bg} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 transition-all duration-300 transform translate-y-4 opacity-0 font-medium`;
            toast.innerHTML = `<i class="fas ${icon}"></i><span class="text-sm">${escapeHtml(message)}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
            });
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const updateDataByPath = (obj, path, value) => {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) {
                if (!current[keys[i]]) current[keys[i]] = {};
                current = current[keys[i]];
            }
            current[keys[keys.length - 1]] = value;
        };

        const bindInputs = () => {
            const container = document.getElementById('main-area');
            container.querySelectorAll('input[data-model], textarea[data-model], select[data-model]').forEach(el => {
                const newEl = el.cloneNode(true);
                el.parentNode.replaceChild(newEl, el);
                
                newEl.addEventListener('input', (e) => {
                    updateDataByPath(state.projectData, e.target.dataset.model, e.target.value);
                    scheduleSave();
                });

                newEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                        const model = e.target.dataset.model;
                        if (!model) return;
                        const parts = model.split('.');
                        
                        if (parts[0] === 'tasks' && parts.length === 3) {
                            if (parseInt(parts[1]) === state.projectData.tasks.length - 1) {
                                e.preventDefault();
                                window.addTask(true);
                            }
                        } else if (parts[0] === 'schedule' && parts[1] === 'milestones' && parts.length === 4) {
                            if (parseInt(parts[2]) === state.projectData.schedule.milestones.length - 1) {
                                e.preventDefault();
                                window.addMilestone(true);
                            }
                        } else if (parts[0] === 'resources' && parts.length === 4) {
                            const type = parts[1];
                            if (parseInt(parts[2]) === state.projectData.resources[type].length - 1) {
                                e.preventDefault();
                                window.addResource(type, true);
                            }
                        } else if (parts[0] === 'risks' && parts.length === 3) {
                            if (parseInt(parts[1]) === state.projectData.risks.length - 1) {
                                e.preventDefault();
                                window.addRisk(true);
                            }
                        } else if (parts[0] === 'communications' && parts.length === 3) {
                            if (parseInt(parts[1]) === state.projectData.communications.length - 1) {
                                e.preventDefault();
                                window.addComm(true);
                            }
                        }
                    }
                });
            });

            if (focusAfterRender) {
                const targetEl = container.querySelector(`[data-model="${focusAfterRender}"]`);
                if (targetEl) {
                    targetEl.focus();
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                focusAfterRender = null;
            }
        };

        window.moveItem = (listPath, index, direction) => {
            let list;
            if (listPath.startsWith('resources.')) {
                const type = listPath.split('.')[1];
                list = state.projectData.resources[type];
            } else if (listPath === 'milestones') {
                list = state.projectData.schedule.milestones;
            } else {
                list = state.projectData[listPath];
            }
            
            if (direction === -1 && index > 0) {
                const temp = list[index];
                list[index] = list[index - 1];
                list[index - 1] = temp;
            } else if (direction === 1 && index < list.length - 1) {
                const temp = list[index];
                list[index] = list[index + 1];
                list[index + 1] = temp;
            } else {
                return; 
            }
            
            scheduleSave();
            renderMain();
        };

        // --- Templates Logic ---
        window.insertTemplate = (field) => {
            const templates = {
                'basic.objective': "【ターゲットユーザー】の【抱える課題】を解決するため、【システム・施策名】を導入・改修する。\nこれにより、【具体的な目標数値や状態】を達成することをゴールとする。",
                'basic.background': "現在、【既存の環境やシステム】において【具体的な問題・非効率】が発生している。\nこれが原因で【ビジネス上の悪影響（コスト増、機会損失など）】を引き起こしているため、早急な改善が求められているプロジェクトである。"
            };
            
            const currentVal = state.projectData.basic[field.split('.')[1]];
            if(currentVal && currentVal.trim() !== '') {
                if(!confirm('既に入力されている内容が上書きされます。よろしいですか？')) return;
            }
            
            updateDataByPath(state.projectData, field, templates[field]);
            scheduleSave();
            renderMain();
            window.showToast("テンプレートを挿入しました。内容を書き換えてください。", "success");
        };

        // ==========================================
        // Firebase & Data Persistence
        // ==========================================
        const updateSaveStatusUI = (status = 'idle') => {
            const statusEl = document.getElementById('save-status');
            
            if (status === 'saving') {
                statusEl.innerHTML = `<i class="fas fa-sync-alt fa-spin text-blue-500"></i> 保存中...`;
                statusEl.classList.replace('bg-slate-100', 'bg-blue-50');
            } else if (status === 'saved') {
                statusEl.innerHTML = `<i class="fas fa-check text-green-600"></i> 保存完了`;
                statusEl.classList.replace('bg-blue-50', 'bg-green-50');
                
                setTimeout(() => {
                    statusEl.classList.replace('bg-green-50', 'bg-slate-100');
                    updateSaveStatusUI('idle');
                }, 2000);
            } else {
                if (state.isCloudMode) {
                    statusEl.innerHTML = `
                        <span class="relative flex h-3 w-3">
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        クラウド自動保存ON
                    `;
                } else {
                    statusEl.innerHTML = `
                        <span class="relative flex h-3 w-3">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                        </span>
                        ローカル動作中
                    `;
                }
            }
        };

        async function initFirebase() {
            loadFromLocal(); 

            try {
                if (typeof __firebase_config === 'undefined' || !__firebase_config) {
                    console.warn("Firebase config not found. Running in local mode.");
                    return finishLoading();
                }

                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserId = user.uid;
                        state.isCloudMode = true;
                        updateSaveStatusUI();
                        loadDataFromFirebase();
                    } else {
                        currentUserId = null;
                        finishLoading();
                    }
                });
            } catch (error) {
                console.error("Firebase initialization failed:", error);
                window.showToast("クラウド接続に失敗しました。ローカルモードで動作します。", "error");
                finishLoading();
            }
        }

        let unsubscribeSnapshot = null;
        function loadDataFromFirebase() {
            if (!currentUserId || !db) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'data', 'projectPlan');
            
            unsubscribeSnapshot = onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const loadedData = snapshot.data();
                    state.projectData = { ...createDefaultData(), ...loadedData };
                }
                finishLoading();
            }, (error) => {
                console.error("Error loading data from Firestore:", error);
                window.showToast("データの読み込みに失敗しました", "error");
                finishLoading();
            });
        }

        let saveTimeout = null;
        function scheduleSave() {
            saveToLocal(); 
            
            updateSaveStatusUI('saving');

            if (!state.isCloudMode || !currentUserId || !db) {
                setTimeout(() => updateSaveStatusUI('saved'), 300); // ローカル時はすぐ完了表示
                return;
            }
            
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'data', 'projectPlan');
                    await setDoc(docRef, state.projectData);
                    updateSaveStatusUI('saved');
                } catch (error) {
                    console.error("Error saving data:", error);
                    window.showToast("データの自動保存に失敗しました", "error");
                    updateSaveStatusUI('idle');
                }
            }, 1000); // 1s debounce
        }

        function finishLoading() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            renderSidebar();
            renderMain();
        }

        // ==========================================
        // UI Rendering Logic
        // ==========================================
        window.changeStep = (index) => {
            if (index < 0 || index >= STEPS.length) return;
            state.currentStepIndex = index;
            renderSidebar();
            renderMain();
        };

        window.nextStep = () => window.changeStep(state.currentStepIndex + 1);
        window.prevStep = () => window.changeStep(state.currentStepIndex - 1);

        const checkStepCompletion = (stepId) => {
            const d = state.projectData;
            switch(stepId) {
                case 'basic': return !!d.basic.name.trim();
                case 'tasks': return d.tasks.length > 0 && d.tasks.every(t => !!t.name.trim());
                case 'schedule': return !!d.schedule.start && !!d.schedule.end;
                case 'resources': return d.resources.human.length > 0 || d.resources.material.length > 0 || d.resources.intangible.length > 0;
                case 'risks': return d.risks.length > 0 && d.risks.every(r => !!r.description.trim());
                case 'communications': return d.communications.length > 0 && d.communications.every(c => !!c.meeting.trim());
                case 'preview': return true;
                default: return false;
            }
        };

        const calculateProgress = () => {
            const completableSteps = STEPS.filter(s => s.id !== 'preview');
            const completedCount = completableSteps.filter(s => checkStepCompletion(s.id)).length;
            return Math.round((completedCount / completableSteps.length) * 100);
        };

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const progress = calculateProgress();
            
            let html = `
                <div class="mb-6 px-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-semibold text-slate-500">入力進捗</span>
                        <span class="text-xs font-bold text-blue-600">${progress}%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div class="bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                    </div>
                </div>
                <ul class="space-y-1">
            `;
            
            STEPS.forEach((step, index) => {
                const isActive = index === state.currentStepIndex;
                const isCompleted = checkStepCompletion(step.id);
                const activeClasses = isActive ? 'bg-blue-50 text-blue-800 font-semibold shadow-sm ring-1 ring-blue-200 translate-x-1' : 'text-slate-600 hover:bg-slate-50 border-transparent hover:translate-x-1';
                
                let iconCls = step.icon;
                let iconColor = 'text-slate-400';
                if (isCompleted && step.id !== 'preview') {
                    iconCls = 'fa-check-circle';
                    iconColor = isActive ? 'text-blue-600' : 'text-green-500';
                } else if (isActive) {
                    iconColor = 'text-blue-600';
                }

                html += `
                    <li>
                        <button onclick="window.changeStep(${index})" class="w-full text-left px-4 py-3 rounded-xl transition-all duration-200 flex items-center gap-3 ${activeClasses}">
                            <i class="fas ${iconCls} ${iconColor} w-5 text-center text-lg transition-colors"></i>
                            <span class="text-sm flex-1">${escapeHtml(step.title)}</span>
                        </button>
                    </li>
                `;
            });
            html += '</ul>';
            nav.innerHTML = html;

            document.getElementById('btn-prev').disabled = state.currentStepIndex === 0;
            const btnNext = document.getElementById('btn-next');
            if (state.currentStepIndex === STEPS.length - 1) {
                btnNext.classList.add('hidden');
            } else {

                        </div>
                        <div class="overflow-hidden rounded-xl border border-slate-200">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead><tr class="bg-slate-100 text-slate-600"><th class="px-5 py-3 font-bold border-b border-slate-200">想定リスク</th><th class="px-3 py-3 w-16 text-center font-bold border-b border-slate-200">確率</th><th class="px-3 py-3 w-16 text-center font-bold border-b border-slate-200">影響</th><th class="px-5 py-3 w-1/2 font-bold border-b border-slate-200">対策</th></tr></thead>
                            <tbody>
                                ${d.risks.length === 0 ? '<tr><td colspan="4" class="border-b border-slate-200 px-5 py-4 text-center text-slate-400 italic">リスク項目がありません</td></tr>' : 
                                  d.risks.map(r => `<tr class="hover:bg-slate-50 transition-colors"><td class="border-b border-slate-200 px-5 py-4 font-bold text-slate-800">${escapeHtml(r.description)}</td><td class="border-b border-slate-200 px-3 py-4 text-center"><span class="inline-block px-2 py-1 rounded bg-slate-100 text-xs font-bold">${escapeHtml(r.probability)}</span></td><td class="border-b border-slate-200 px-3 py-4 text-center"><span class="inline-block px-2 py-1 rounded bg-slate-100 text-xs font-bold">${escapeHtml(r.impact)}</span></td><td class="border-b border-slate-200 px-5 py-4 text-slate-600 whitespace-pre-wrap leading-relaxed font-medium">${escapeHtml(r.mitigation)}</td></tr>`).join('')}
                            </tbody>
                        </table>
                        </div>
                    </section>

                    <section class="print-break-inside-avoid mb-10">
                        <div class="flex items-center gap-3 mb-5 border-b-2 border-slate-100 pb-2">
                            <div class="w-8 h-8 rounded bg-slate-800 text-white flex items-center justify-center font-bold text-lg">5</div>
                            <h3 class="text-xl font-bold text-slate-800 tracking-wide">コミュニケーション計画</h3>
                        </div>
                        <div class="overflow-hidden rounded-xl border border-slate-200">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead><tr class="bg-slate-100 text-slate-600"><th class="px-4 py-3 font-bold border-b border-slate-200">会議・連絡名</th><th class="px-3 py-3 font-bold border-b border-slate-200">頻度</th><th class="px-3 py-3 font-bold border-b border-slate-200">ツール</th><th class="px-3 py-3 font-bold border-b border-slate-200">発信者</th><th class="px-3 py-3 font-bold border-b border-slate-200">受信者</th><th class="px-4 py-3 font-bold border-b border-slate-200 w-1/3">目的・内容</th></tr></thead>
                            <tbody>
                                ${d.communications.length === 0 ? '<tr><td colspan="6" class="border-b border-slate-200 px-5 py-4 text-center text-slate-400 italic">設定されていません</td></tr>' : 
                                  d.communications.map(c => `<tr class="hover:bg-slate-50 transition-colors"><td class="border-b border-slate-200 px-4 py-3 font-bold text-slate-800">${escapeHtml(c.meeting)}</td><td class="border-b border-slate-200 px-3 py-3 text-slate-600 font-medium">${escapeHtml(c.frequency)}</td><td class="border-b border-slate-200 px-3 py-3 text-slate-600 font-medium">${escapeHtml(c.tool)}</td><td class="border-b border-slate-200 px-3 py-3 text-slate-600 font-medium">${escapeHtml(c.sender)}</td><td class="border-b border-slate-200 px-3 py-3 text-slate-600 font-medium">${escapeHtml(c.receiver)}</td><td class="border-b border-slate-200 px-4 py-3 text-slate-600 whitespace-pre-wrap leading-relaxed font-medium">${escapeHtml(c.purpose)}</td></tr>`).join('')}
                            </tbody>
                        </table>
                        </div>
                    </section>
                </div>
            `;
        }

        // ==========================================
        // Export & Import
        // ==========================================
        window.exportJson = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.projectData, null, 2));
            const dlNode = document.createElement('a');
            dlNode.setAttribute("href", dataStr);
            dlNode.setAttribute("download", `ProjectPlan_${state.projectData.basic.name || 'Untitled'}.json`);
            document.body.appendChild(dlNode); // Required for Firefox
            dlNode.click();
            dlNode.remove();
            window.showToast("JSONデータをダウンロードしました", "success");
        };

        window.triggerImport = () => {
            document.getElementById('import-file-input').click();
        };

        window.importJson = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    state.projectData = { ...createDefaultData(), ...imported };
                    renderSidebar();
                    renderMain();
                    scheduleSave();
                    window.showToast("データをインポートしました", "success");
                } catch (err) {
                    window.showToast("ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。", "error");
                }
                event.target.value = ''; // Reset file input
            };
            reader.readAsText(file);
        };

        // ==========================================
        // Reset Logic
        // ==========================================
        window.showResetModal = () => {
            document.getElementById('reset-modal').classList.remove('hidden');
        };

        window.closeResetModal = () => {
            document.getElementById('reset-modal').classList.add('hidden');
        };

        window.executeReset = () => {
            state.projectData = createDefaultData();
            state.currentStepIndex = 0;
            saveToLocal();
            
            if (state.isCloudMode && currentUserId && db) {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'data', 'projectPlan');
                setDoc(docRef, state.projectData).catch(e => console.error(e));
            }
            
            renderSidebar();
            renderMain();
            window.closeResetModal();
            window.showToast("計画をリセットし、最初から開始しました", "success");
        };

        // ==========================================
        // Initialization
        // ==========================================
        window.onload = () => {
            initFirebase();
            
            // グローバルショートカットキーの登録 (Ctrl+Enterで次へ進む)
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    // テキストエリア入力中の改行時(ただのEnter)は既に弾いているが念の為
                    e.preventDefault();
                    if (state.currentStepIndex < STEPS.length - 1) {
                        window.nextStep();
                    }
                }
            });
        };

    </script>
</body>
</html>
