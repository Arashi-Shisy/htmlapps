<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講義デザイナー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas (画像化ライブラリ) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- アイコンコンポーネント ---
        const Icons = {
            Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            ArrowUp: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>,
            ArrowDown: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>,
            Download: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Upload: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Target: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Clock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            BookOpen: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Camera: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
            Settings: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            GripVertical: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>
        };

        // --- メインアプリケーション ---
        const App = () => {
            // --- ローカルストレージ連携 ---
            const STORAGE_KEY = 'lecture_designer_save_data';
            
            const getInitialData = () => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('保存データの読み込みに失敗しました', e);
                    }
                }
                return null;
            };
            
            const initialData = getInitialData();

            const [lectureInfo, setLectureInfo] = useState(
                initialData?.lectureInfo || {
                    title: '',
                    goal: '',
                    totalTime: 60
                }
            );
            
            const [sections, setSections] = useState(
                initialData?.sections || [
                    { id: Date.now().toString(), type: '講義', duration: 10, content: '', expectedState: '' }
                ]
            );

            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // D&D用のステート
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ lectureInfo, sections }));
            }, [lectureInfo, sections]);

            const [isExportingImage, setIsExportingImage] = useState(false);
            const fileInputRef = useRef(null);

            const handleInfoChange = (e) => {
                const { name, value } = e.target;
                setLectureInfo(prev => ({ 
                    ...prev, 
                    [name]: name === 'totalTime' ? (value ? parseInt(value) : '') : value 
                }));
            };

            const addSection = () => {
                const newId = Date.now().toString();
                setSections([...sections, {
                    id: newId,
                    type: '講義',
                    duration: 10,
                    content: '',
                    expectedState: ''
                }]);
                
                // 新しく追加した入力欄に自動でフォーカスを当てる（少し遅延させる）
                setTimeout(() => {
                    const newEl = document.getElementById(`content-${newId}`);
                    if (newEl) newEl.focus();
                }, 100);
            };

            const updateSection = (id, field, value) => {
                setSections(sections.map(sec => 
                    sec.id === id ? { ...sec, [field]: field === 'duration' ? (value ? parseInt(value) : '') : value } : sec
                ));
            };

            const removeSection = (id) => {
                if (sections.length <= 1) return;
                setSections(sections.filter(sec => sec.id !== id));
            };

            // ドラッグ＆ドロップハンドラー
            const handleDragStart = (e, index) => {
                setDraggedIdx(index);
                e.dataTransfer.effectAllowed = 'move';
                // Firefox対策としてダミーデータをセット
                e.dataTransfer.setData('text/plain', index);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault(); // ドロップを許可
                e.dataTransfer.dropEffect = 'move';
                if (dragOverIdx !== index) {
                    setDragOverIdx(index);
                }
            };

            const handleDrop = (e, index) => {
                e.preventDefault();
                if (draggedIdx === null || draggedIdx === index) {
                    setDragOverIdx(null);
                    setDraggedIdx(null);
                    return;
                }
                
                const newSections = [...sections];
                const draggedItem = newSections.splice(draggedIdx, 1)[0];
                newSections.splice(index, 0, draggedItem);
                
                setSections(newSections);
                setDragOverIdx(null);
                setDraggedIdx(null);
            };

            const handleDragEnd = () => {
                setDragOverIdx(null);
                setDraggedIdx(null);
            };

            // JSONデータエクスポート
            const exportData = () => {
                const data = { lectureInfo, sections };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const fileNamePrefix = lectureInfo.title || '名称未設定';
                a.download = `${fileNamePrefix}_design.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // 画像エクスポート
            const exportImage = async () => {
                const element = document.getElementById('story-board');
                if (!element) return;
                
                setIsExportingImage(true);
                try {
                    const canvas = await window.html2canvas(element, {
                        backgroundColor: '#1e293b',
                        scale: 2,
                        logging: false,
                        useCORS: true
                    });
                    
                    const image = canvas.toDataURL("image/png");
                    const a = document.createElement('a');
                    a.href = image;
                    const fileNamePrefix = lectureInfo.title || '名称未設定';
                    a.download = `${fileNamePrefix}_story.png`;
                    a.click();
                } catch (error) {
                    console.error("画像の生成に失敗しました", error);
                    alert("画像の生成に失敗しました。");
                } finally {
                    setIsExportingImage(false);
                }
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.lectureInfo && data.sections) {
                            setLectureInfo(data.lectureInfo);
                            setSections(data.sections);
                        } else {
                            alert('ファイルの形式が正しくありません。');
                        }
                    } catch (err) {
                        alert('ファイルの読み込みに失敗しました。');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const totalCurrentTime = sections.reduce((sum, sec) => sum + (parseInt(sec.duration) || 0), 0);
            const isOverTime = totalCurrentTime > (lectureInfo.totalTime || 0);

            return (
                <div className="min-h-screen font-sans pb-20 text-gray-800">
                    {/* ヘッダー */}
                    <header className="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
                        <div className="container mx-auto px-4 py-3 flex flex-wrap gap-3 justify-between items-center max-w-6xl">
                            <div className="flex items-center gap-2 max-w-full">
                                <Icons.BookOpen className="w-6 h-6 shrink-0" />
                                <h1 className="text-xl font-bold tracking-wide shrink-0">講義デザイナー</h1>
                                {lectureInfo.title && (
                                    <>
                                        <span className="text-indigo-300 mx-1 shrink-0">|</span>
                                        <span className="text-lg font-medium truncate max-w-[150px] sm:max-w-xs md:max-w-md" title={lectureInfo.title}>
                                            {lectureInfo.title}
                                        </span>
                                    </>
                                )}
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-1 bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors">
                                    <Icons.Settings className="w-4 h-4" /> 基本設定
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1 bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded text-sm transition-colors shadow-inner text-white ml-2">
                                    <Icons.Upload className="w-4 h-4" /> 読込
                                </button>
                                <input type="file" ref={fileInputRef} onChange={importData} accept=".json" className="hidden" />
                                <button onClick={exportData} className="flex items-center gap-1 bg-white text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow">
                                    <Icons.Download className="w-4 h-4" /> JSON保存
                                </button>
                                <button onClick={exportImage} disabled={isExportingImage} className="flex items-center gap-1 bg-emerald-500 text-white hover:bg-emerald-600 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow disabled:opacity-50">
                                    <Icons.Camera className="w-4 h-4" /> {isExportingImage ? '画像生成中...' : 'ストーリー画像保存'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 mt-8 flex flex-col lg:flex-row gap-8 items-start max-w-6xl">
                        
                        {/* 左カラム: 編集エリア */}
                        <div className="w-full lg:w-7/12 flex flex-col gap-6">
                            <section>
                                <div className="flex justify-between items-end mb-4 px-1">
                                    <h2 className="text-lg font-bold flex items-center gap-2 text-gray-800">
                                        <Icons.Clock className="w-5 h-5 text-indigo-500" /> タイムライン
                                    </h2>
                                    <span className="text-sm text-gray-500">※左端を掴んでドラッグで入替</span>
                                </div>
                                
                                <div className="space-y-3">
                                    {sections.map((sec, index) => {
                                        const isDragging = draggedIdx === index;
                                        const isDragOver = dragOverIdx === index && draggedIdx !== index;
                                        
                                        return (
                                            <div 
                                                key={sec.id} 
                                                draggable
                                                onDragStart={(e) => handleDragStart(e, index)}
                                                onDragOver={(e) => handleDragOver(e, index)}
                                                onDrop={(e) => handleDrop(e, index)}
                                                onDragEnd={handleDragEnd}
                                                className={`
                                                    bg-white rounded-xl shadow-sm border-l-4 flex overflow-hidden transition-all duration-200
                                                    ${sec.type === 'ワーク' ? 'border-l-emerald-500' : 'border-l-blue-500'}
                                                    ${isDragging ? 'opacity-40 scale-[0.98]' : 'opacity-100'}
                                                    ${isDragOver ? (draggedIdx < dragOverIdx ? 'border-b-4 border-b-indigo-400 mt-6' : 'border-t-4 border-t-indigo-400 mb-6') : 'border-b border-b-transparent border-t border-t-transparent'}
                                                    hover:shadow-md
                                                `}
                                            >
                                                {/* ドラッグハンドル */}
                                                <div className="bg-gray-50/80 w-8 flex items-center justify-center cursor-grab active:cursor-grabbing hover:bg-gray-100 border-r border-gray-100">
                                                    <Icons.GripVertical className="w-5 h-5 text-gray-400" />
                                                </div>
                                                
                                                <div className="flex-1">
                                                    <div className="px-4 py-3 border-b border-gray-100 flex flex-wrap gap-3 justify-between items-center">
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-gray-400 text-sm font-bold w-5 text-center">{index + 1}</span>
                                                            <select 
                                                                value={sec.type} 
                                                                onChange={(e) => updateSection(sec.id, 'type', e.target.value)}
                                                                className={`text-sm font-bold rounded-lg border-0 py-1.5 pl-3 pr-8 ring-1 ring-inset outline-none focus:ring-2 focus:ring-inset cursor-pointer transition-colors
                                                                    ${sec.type === 'ワーク' ? 'bg-emerald-50 text-emerald-700 ring-emerald-200 focus:ring-emerald-500' : 'bg-blue-50 text-blue-700 ring-blue-200 focus:ring-blue-500'}
                                                                `}
                                                            >
                                                                <option value="講義">講義</option>
                                                                <option value="ワーク">ワーク</option>
                                                            </select>
                                                            <div className="flex items-center gap-1 bg-gray-50 px-2 py-1 rounded-lg border border-gray-200 shadow-sm focus-within:ring-2 focus-within:ring-indigo-500 focus-within:bg-white transition-colors">
                                                                <input type="number" value={sec.duration} onChange={(e) => updateSection(sec.id, 'duration', e.target.value)} min="1" className="w-12 outline-none text-right font-bold text-gray-700 bg-transparent" />
                                                                <span className="text-sm text-gray-500 font-medium">分</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center">
                                                            <button onClick={() => removeSection(sec.id)} disabled={sections.length <= 1} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg disabled:opacity-30 disabled:hover:bg-transparent transition-colors">
                                                                <Icons.Trash2 className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <div className="p-4 space-y-3">
                                                        <div>
                                                            <input 
                                                                id={`content-${sec.id}`}
                                                                type="text"
                                                                value={sec.content} 
                                                                onChange={(e) => updateSection(sec.id, 'content', e.target.value)} 
                                                                placeholder={sec.type === '講義' ? '例: HTMLの基本構造についてスライドで解説' : '例: エディタを開いて実際にコードを書いてみる'} 
                                                                className="w-full bg-gray-50 border-transparent focus:bg-white rounded-lg border p-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" 
                                                            />
                                                        </div>
                                                        <div className="relative">
                                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                                <Icons.Target className="h-4 w-4 text-indigo-400" />
                                                            </div>
                                                            <input 
                                                                type="text" 
                                                                value={sec.expectedState} 
                                                                onChange={(e) => updateSection(sec.id, 'expectedState', e.target.value)} 
                                                                placeholder="どういう状態になるべきか (例: HTMLの基本構造を理解し、説明できる)" 
                                                                className="w-full bg-indigo-50/50 border-indigo-100 focus:bg-white rounded-lg border py-2 pl-9 pr-3 text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-indigo-300" 
                                                            />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <button onClick={addSection} className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-semibold hover:text-indigo-600 hover:border-indigo-400 hover:bg-indigo-50 flex items-center justify-center gap-2 transition-all shadow-sm">
                                    <Icons.Plus className="w-5 h-5" /> セクションを追加する
                                </button>
                            </section>
                        </div>

                        {/* 右カラム: プレビュー・視覚化エリア */}
                        <div className="w-full lg:w-5/12 flex flex-col gap-6 lg:sticky lg:top-24">
                            
                            {/* 4. 時間管理プログレスバー */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                                <div className={`absolute top-0 left-0 w-full h-1.5 transition-colors ${isOverTime ? 'bg-red-500' : 'bg-indigo-500'}`}></div>
                                <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center justify-between mt-1">
                                    <span>所要時間チェック</span>
                                    <div className="text-right">
                                        <span className={`text-2xl font-black ${isOverTime ? 'text-red-600' : 'text-indigo-600'}`}>
                                            {totalCurrentTime}
                                        </span>
                                        <span className="text-sm font-medium text-gray-500 ml-1">/ {lectureInfo.totalTime || 0} 分</span>
                                    </div>
                                </h3>
                                
                                <div className="w-full bg-gray-100 rounded-full h-3 mb-3 overflow-hidden flex shadow-inner">
                                    {sections.map((sec, idx) => {
                                        const secRatio = lectureInfo.totalTime > 0 ? ((parseInt(sec.duration) || 0) / lectureInfo.totalTime) * 100 : 0;
                                        return (
                                            <div 
                                                key={sec.id}
                                                title={`${idx+1}. ${sec.type} (${sec.duration}分)`}
                                                className={`h-full border-r border-white/40 last:border-0 transition-all duration-300 ${sec.type === 'ワーク' ? 'bg-emerald-400 hover:bg-emerald-500' : 'bg-blue-400 hover:bg-blue-500'}`}
                                                style={{ width: `${secRatio}%` }}
                                            ></div>
                                        );
                                    })}
                                </div>
                                
                                <div className="flex justify-between items-center text-xs">
                                    <div className="flex gap-4 font-medium text-gray-500">
                                        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-blue-400 shadow-sm"></span> 講義</span>
                                        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-sm"></span> ワーク</span>
                                    </div>
                                    {isOverTime && <span className="text-red-600 font-bold bg-red-50 px-2 py-1 rounded">※時間を超過しています</span>}
                                </div>
                            </div>

                            {/* 5. ゴールへの流れ */}
                            <div className="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-y-auto max-h-[calc(100vh-280px)] custom-scrollbar">
                                <div id="story-board" className="p-6 md:p-8 relative bg-slate-800">
                                    <div className="absolute top-0 right-0 p-4 opacity-[0.02] pointer-events-none">
                                        <Icons.Target className="w-48 h-48 text-white" />
                                    </div>
                                    
                                    <div className="mb-8 border-b border-slate-700/60 pb-5">
                                        <h3 className="text-white font-bold flex flex-col gap-3 text-lg">
                                            {lectureInfo.title && (
                                                <span className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-white">{lectureInfo.title}</span>
                                            )}
                                            <div className="flex items-center gap-2 text-slate-300">
                                                <Icons.BookOpen className="w-5 h-5 text-indigo-400" />
                                                <span className="text-sm tracking-widest font-medium">ゴールまでのストーリー</span>
                                            </div>
                                        </h3>
                                    </div>

                                    <div className="relative pl-5 border-l-2 border-slate-600/50 space-y-8 pb-8">
                                        {sections.map((sec, idx) => (
                                            <div key={sec.id} className="relative group">
                                                <div className={`absolute -left-[27px] top-1.5 w-5 h-5 rounded-full border-4 border-slate-800 shadow-sm transition-transform group-hover:scale-125 ${sec.type === 'ワーク' ? 'bg-emerald-400' : 'bg-blue-400'}`}></div>
                                                
                                                <div className="bg-slate-700/40 rounded-xl p-4 text-sm border border-slate-600/50 hover:border-slate-500 transition-colors shadow-sm flex flex-col gap-2.5 backdrop-blur-sm">
                                                    <div className="text-slate-300 font-medium leading-relaxed">
                                                        <span className="font-mono text-[10px] font-bold text-slate-400 tracking-widest mr-2 uppercase bg-slate-800 px-1.5 py-0.5 rounded">STEP {idx + 1}</span>
                                                        {sec.content || <span className="text-slate-500 italic font-normal text-xs">内容が未設定です</span>}
                                                    </div>
                                                    <div className="font-bold text-white text-[15px] leading-relaxed">
                                                        {sec.expectedState || <span className="text-slate-500 italic font-normal">到達状態が未設定です</span>}
                                                    </div>
                                                    <div className="flex justify-end mt-1">
                                                        <span className={`text-[11px] px-2.5 py-1 rounded-md font-bold border tracking-wider shadow-sm ${sec.type === 'ワーク' ? 'bg-emerald-900/40 text-emerald-400 border-emerald-800/60' : 'bg-blue-900/40 text-blue-400 border-blue-800/60'}`}>
                                                            {sec.type} {sec.duration} 分
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 最終ゴール */}
                                    <div className="mt-4 pt-6">
                                        <div className="bg-gradient-to-br from-indigo-600/40 to-purple-600/40 border border-indigo-400/30 rounded-2xl p-6 relative overflow-hidden shadow-2xl backdrop-blur-md">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-bl-full -mr-8 -mt-8"></div>
                                            <div className="text-indigo-200 text-xs font-black mb-3 flex items-center gap-1.5 tracking-widest uppercase">
                                                <Icons.Target className="w-4 h-4" /> 最終ゴール
                                            </div>
                                            <div className="text-white font-bold text-lg leading-snug drop-shadow-md">
                                                {lectureInfo.goal || <span className="text-indigo-200/40 italic font-normal text-sm">基本設定でゴールを入力してください</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* 基本設定モーダル */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 transition-opacity" onClick={() => setIsModalOpen(false)}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50/50">
                                    <h2 className="text-lg font-bold flex items-center gap-2 text-gray-800">
                                        <Icons.Settings className="w-5 h-5 text-indigo-500" /> 基本設定
                                    </h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1.5 rounded-full hover:bg-gray-200 transition-colors">
                                        <Icons.X className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="p-6 space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">講義名</label>
                                        <input type="text" name="title" value={lectureInfo.title} onChange={handleInfoChange} placeholder="例: はじめてのプログラミング" className="w-full bg-gray-50 border-gray-200 focus:bg-white rounded-xl shadow-sm border p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">講義のゴール</label>
                                        <textarea name="goal" value={lectureInfo.goal} onChange={handleInfoChange} placeholder="例: 参加者が自力で簡単なWebサイトを公開できるようになる" rows="3" className="w-full bg-gray-50 border-gray-200 focus:bg-white rounded-xl shadow-sm border p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none resize-y" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">予定講義時間</label>
                                        <div className="flex items-center gap-2">
                                            <input type="number" name="totalTime" value={lectureInfo.totalTime} onChange={handleInfoChange} min="1" className="w-32 bg-gray-50 border-gray-200 focus:bg-white rounded-xl shadow-sm border p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-lg font-bold text-center" />
                                            <span className="text-gray-500 font-bold">分</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-5 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button onClick={() => setIsModalOpen(false)} className="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg active:scale-95">
                                        完了
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.6); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.9); }
    </style>
</body>
</html>
